# Render Blueprint configuration for Sorim CRM
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: sorim-crm
    env: python
    region: singapore  # Closest to India for low latency
    plan: free
    buildCommand: cd frontend && npm install && npm run build && cd ../backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DEVICE_CONFIG_FILE
        value: devices.json
      - key: BIOMETRIC_DB_FILE
        value: backend/data/attendance.db
      - key: AUTO_SYNC_INTERVAL
        value: "60"
      - key: EMAIL_REPORT_ENABLED
        value: "false"
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: ""
      - key: SMTP_PASSWORD
        value: ""
      - key: SMTP_FROM
        value: ""
      - key: SMTP_TO
        value: ""